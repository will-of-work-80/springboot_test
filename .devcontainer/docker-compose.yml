version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    image: springboot-thymeleaf-dev:latest

    container_name: springboot-dev

    ports:
      - "8080:8080"
      - "8443:8443"

    volumes:
      - ..:/workspace
      - ~/.m2:/home/vscode/.m2:cached

    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2048m"
      MAVEN_OPTS: "-Dmaven.wagon.http.retryHandler.class=standard"

    working_dir: /workspace

    command: /bin/bash

    stdin_open: true

    tty: true

    user: vscode

