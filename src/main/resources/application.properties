# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=springboot-thymeleaf-demo

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# H2 Database Configuration
spring.datasource.url=jdbc:h2:~/springboot-demo/h2db;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (enable for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization
# spring.sql.init.mode=always
# 最初はこちらを実行する事で、DBに初期データを投入することができます。
# 初期化データはdata.sqlに記述してください。
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.root=INFO
logging.level.com.example.springbootdemo=DEBUG
