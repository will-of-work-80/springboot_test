<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/about.css}">
</head>
<body>
    <div class="container">
        <h1>About This Project</h1>

        <div class="info-box">
            <p>
                <strong>Project Name:</strong>
                <span th:text="${projectName}">Project Name</span>
            </p>
            <p>
                <strong>Version:</strong>
                <span th:text="${version}">1.0.0</span>
            </p>
            <p>
                <strong>Framework:</strong>
                Spring Boot 3.3.0
            </p>
            <p>
                <strong>Template Engine:</strong>
                Thymeleaf
            </p>
        </div>

        <h2>Features</h2>
        <ul>
            <li>Spring Boot Web Starter</li>
            <li>Thymeleaf Template Engine</li>
            <li>Responsive Design</li>
            <li>Dynamic Content Rendering</li>
        </ul>

        <div class="back-link">
            <a th:href="@{/}">Back to Home</a>
        </div>
    </div>
</body>
</html>
