<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Spring Boot Demo'">Title</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <th:block layout:fragment="extra-css"></th:block>
</head>
<body>
    <!-- ヘッダー -->
    <header class="header">
        <div class="header-content">
            <h1 class="header-title" th:text="${companyName}">〇〇 Company</h1>
            <div class="login-info">
                <div class="login-item">
                    <span class="info-label">部署:</span>
                    <span class="info-value" th:text="${department}">△△部署</span>
                </div>
                <div class="login-item">
                    <span class="info-label">名前:</span>
                    <span class="info-value" th:text="${userName}">秋山　◇◇</span>
                </div>
                <div class="login-item">
                    <span class="info-label">スタッフコード:</span>
                    <span class="info-value" th:text="${staffCode}">999999999901</span>
                </div>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <th:block layout:fragment="content"></th:block>
    </main>

    <!-- フッター -->
    <footer class="footer">
        <p class="footer-text">こちらはテスト用のサイトです。</p>
        <div class="footer-links">
            <a th:href="@{/}">ホームに戻る</a>
            <a th:href="@{/main}">メインページ</a>
        </div>
    </footer>
</body>
</html>
